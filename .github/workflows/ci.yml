name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w shared
      - run: npm run lint
      - run: npm run format:check

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w shared
      - run: npm run test -w backend -- --coverage
      - run: npm run test:e2e -w backend -- --coverage
      - name: Upload backend coverage
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
      - name: Upload backend E2E coverage
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: backend-e2e-coverage
          path: backend/coverage-e2e/lcov.info

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w shared
      - run: npm run test -w frontend -- --coverage
      - name: Upload frontend coverage
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
      - name: Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(jq -r '.packages["node_modules/@playwright/test"].version' package-lock.json)" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.PLAYWRIGHT_VERSION }}-chromium
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium
        working-directory: frontend
        timeout-minutes: 5
      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium
        working-directory: frontend
      - name: Run E2E tests with coverage
        run: npm run test:e2e:coverage -w frontend
      - name: Upload frontend E2E coverage
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: frontend-e2e-coverage
          path: frontend/coverage-e2e/lcov.info

