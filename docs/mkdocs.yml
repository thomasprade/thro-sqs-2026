site_name: Recipe App

# Repository
repo_name: thomasprade/thro-sqs-2026
repo_url: https://github.com/thomasprade/thro-sqs-2026

# Copyright
copyright: Copyright &copy; 2026 SQS Team Prade

theme:
  name: material
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-2
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono

docs_dir: .

plugins:
  - search
  - mkdocstrings:
      default_handler: python
  - plantuml:
      puml_url: https://www.plantuml.com/plantuml/
      num_retries: 20
markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
  - md_in_html

# Page tree
nav:
  - Home:
      - index.md
      - c4:
          - c4/c4.md
      - arc42:
          - arc42/01_introduction_and_goals.md
          - arc42/02_architecture_constraints.md
          - arc42/03_context_and_scope.md
          - arc42/04_solution_strategy.md
          - arc42/05_building_block_view.md
          - arc42/06_runtime_view.md
          - arc42/07_deployment_view.md
          - arc42/08_crosscutting_concepts.md
          - arc42/09_architecture_decisions.md
          - arc42/10_quality.md
          - arc42/11_risks_and_technical_dept.md
          - arc42/12_glossary.md
      - adr:
          - adr/adr001_core_architecture.md
          - adr/adr002_secure_endpoint.md
